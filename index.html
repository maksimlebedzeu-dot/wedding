<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #05050a;
  color: white;
  overflow-x: hidden;
}

/* ⭐ canvas */
#canvas {
  position: fixed;
  top:0;
  left:0;
  z-index:0;
}

/* контент */
.content {
  position: relative;
  z-index: 2;
}

.section {
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.block {
  background: rgba(255,255,255,0.06);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

h1 {
  font-family: 'Playfair Display';
  font-size: 60px;
}

/* таймер */
#countdown {
  margin-top:10px;
  font-size:18px;
  opacity:0.8;
}

/* 💥 вспышка */
.flash {
  position: fixed;
  width:10px;
  height:10px;
  border-radius:50%;
  background: radial-gradient(circle, white, transparent);
  pointer-events:none;
  z-index: 5;
  animation: flash 0.8s ease-out forwards;
}

@keyframes flash {
  from { transform: scale(1); opacity:1; }
  to { transform: scale(25); opacity:0; }
}

/* 🌑 затемнение */
.fade {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  transition: 0.6s;
  z-index:4;
  pointer-events:none;
}

.fade.active {
  opacity:1;
}

/* 🆕 сцена */
.scene2 {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#f3efe8;
  color:#222;
  z-index:6;
  opacity:0;
  pointer-events:none;
  transition: 0.6s;
  overflow-y:auto;
  padding:40px 20px;
}

.scene2.active {
  opacity:1;
  pointer-events:auto;
}

/* карточки */
.cards {
  max-width:900px;
  margin:auto;
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.card {
  background:white;
  padding:20px;
  border-radius:20px;
  width:280px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  animation: fadeUp 1s ease;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}

.back {
  position:fixed;
  top:20px;
  left:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="fade" id="fade"></div>

<div class="content">

  <div class="section">
    <div>
      <h1>Марта & Максим</h1>
      <p>17 июля 2027</p>
      <div id="countdown"></div>
    </div>
  </div>

  <div class="section">
    <div class="block">Всё началось с одного взгляда</div>
  </div>

  <div class="section">
    <div class="block">Мы нашли друг друга</div>
  </div>

  <div class="section">
    <div class="block">И хотим разделить этот день с вами</div>
  </div>

</div>

<!-- новая сцена -->
<div class="scene2" id="scene2">
  <div class="back" onclick="closeScene()">← назад</div>

  <div class="cards">
    <div class="card">
      <h2>Wedding day</h2>
      <p>17 / 07 / 2027</p>
    </div>

    <div class="card">
      <h3>Программа</h3>
      <p>15:30 сбор</p>
      <p>16:00 церемония</p>
      <p>18:30 банкет</p>
    </div>

    <div class="card">
      <h3>Место</h3>
      <p>Моринское агроусадьба</p>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w,h;

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ⭐ звезды */
let stars = [];
for(let i=0;i<120;i++){
  stars.push({
    x:Math.random()*w,
    y:Math.random()*h
  });
}

/* ☄️ кометы */
let comets = [];

function createComet(){
  comets.push({
    x: Math.random()*w*0.7,
    y: -50,
    vx: 0.8,
    vy: 0.8
  });
}

/* 🎯 КЛИК ЧЕРЕЗ WINDOW (ключевой фикс) */
window.addEventListener('click', (e)=>{
  const mx = e.clientX;
  const my = e.clientY;

  comets.forEach(c=>{
    const dist = Math.hypot(mx - c.x, my - c.y);

    if(dist < 60){
      flash(mx,my);
      openScene();
    }
  });
});

/* 💥 */
function flash(x,y){
  const f = document.createElement('div');
  f.className='flash';
  f.style.left=x+'px';
  f.style.top=y+'px';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),800);
}

/* 🎬 сцена */
function openScene(){
  document.getElementById('fade').classList.add('active');

  setTimeout(()=>{
    document.getElementById('scene2').classList.add('active');
  },400);
}

function closeScene(){
  document.getElementById('scene2').classList.remove('active');

  setTimeout(()=>{
    document.getElementById('fade').classList.remove('active');
  },300);
}

/* 🎨 draw */
function draw(){
  ctx.clearRect(0,0,w,h);

  // звезды
  stars.forEach(s=>{
    ctx.fillStyle='white';
    ctx.fillRect(s.x,s.y,1,1);
  });

  // кометы
  comets.forEach((c,i)=>{
    ctx.strokeStyle='white';
    ctx.beginPath();
    ctx.moveTo(c.x,c.y);
    ctx.lineTo(c.x-80,c.y-80);
    ctx.stroke();

    c.x+=c.vx;
    c.y+=c.vy;

    if(c.y>h+100) comets.splice(i,1);
  });

  requestAnimationFrame(draw);
}
draw();

setInterval(()=>{ if(Math.random()>0.5) createComet(); },3000);

/* ⏳ таймер */
const el = document.getElementById('countdown');
const date = new Date('2027-07-17');

function update(){
  const diff = date - new Date();
  const days = Math.floor(diff/1000/60/60/24);
  el.innerHTML = days + " дней";
}
setInterval(update,1000);
update();
</script>

</body>
</html>
