<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #05050a;
  color: white;
  overflow-x: hidden;
}

/* 🌌 ЗВЁЗДЫ */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
  z-index: 1;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 5em;
  letter-spacing: 3px;
  margin: 0;
}

.hero p {
  margin-top: 20px;
  opacity: 0.7;
}

/* SECTION */
.section {
  padding: 120px 20px;
  max-width: 900px;
  margin: auto;
  position: relative;
  z-index: 1;
}

/* АНИМАЦИЯ */
.fade {
  opacity: 0;
  transform: translateY(60px);
  transition: 1.2s ease;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
}

/* КАРТОЧКИ */
.block {
  margin-top: 40px;
  padding: 40px;
  border-radius: 25px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
}

/* КНОПКА */
button {
  margin-top: 20px;
  padding: 14px 28px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #7b6cff, #9d8cff);
  color: white;
  cursor: pointer;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  background: rgba(255,255,255,0.08);
  color: white;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="hero">
  <div>
    <h1>Марта & Максим</h1>
    <p>17 июля 2027</p>
  </div>
</div>

<div class="section fade">
  <h2>Это началось...</h2>
  <div class="block">
    <p>И стало историей, которую мы хотим разделить с вами</p>
  </div>
</div>

<div class="section fade">
  <h2>Будете с нами?</h2>
  <div class="block">
    <input id="name" placeholder="Ваше имя">
    <br>
    <button onclick="send()">Я приду</button>
  </div>
</div>

<script>
/* 🌌 ЗВЁЗДНОЕ НЕБО */
window.onload = function() {

  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');

  let w, h;
  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // 🖱 положение мыши
  let mouseX = w / 2;
  let mouseY = h / 2;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  // ✨ звезды с глубиной
  let stars = [];

  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random() * w,
      y: Math.random() * h,
      size: Math.random() * 2,
      speed: Math.random() * 0.2,
      depth: Math.random() * 1 // глубина слоя
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);

    stars.forEach(s => {

      // 🎯 параллакс (магия)
      const parallaxX = (mouseX - w/2) * 0.0005 * (s.depth * 50);
      const parallaxY = (mouseY - h/2) * 0.0005 * (s.depth * 50);

      let x = s.x + parallaxX;
      let y = s.y + parallaxY;

      ctx.beginPath();
      ctx.arc(x, y, s.size, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.fill();

      // медленное движение вниз
      s.y += s.speed;

      if (s.y > h) {
        s.y = 0;
        s.x = Math.random() * w;
      }
    });

    requestAnimationFrame(draw);
  }

  draw();

};
</script>

</body>
</html>
