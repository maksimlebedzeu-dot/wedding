<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #05050a;
  color: white;
  overflow-x: hidden;
}

/* 🌌 фон */
#stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* контейнер */
.container {
  position: relative;
  z-index: 1;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 4em;
  margin: 0;
  letter-spacing: 2px;
}

.hero p {
  margin-top: 20px;
  opacity: 0.7;
}

/* ⏳ таймер */
.countdown {
  margin-top: 20px;
  font-size: 2em;
  letter-spacing: 2px;
  font-weight: 300;
}

/* СЕКЦИИ */
.section {
  max-width: 800px;
  margin: 0 auto;
  padding: 120px 20px;
  text-align: center;
}

/* карточки */
.block {
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  line-height: 1.6;
}

/* ✨ анимация */
.fade {
  opacity: 0;
  transform: translateY(60px) scale(0.98);
  filter: blur(10px);
}

.fade.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  filter: blur(0);
  transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
}

/* RSVP */
.rsvp input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 15px;
  width: 250px;
  background: rgba(255,255,255,0.08);
  color: white;
}

.rsvp button {
  margin-top: 15px;
  padding: 12px 24px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(45deg, #7b6cff, #9d8cff);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.rsvp button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(140,120,255,0.5);
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1>Марта & Максим</h1>
    <p>17 июля 2027</p>
    <div class="countdown" id="countdown"></div>
  </div>

  <!-- БЛОКИ -->
  <div class="section fade">
    <div class="block">
      <p>Всё началось с одного взгляда. И вдруг обычные дни стали особенными.</p>
    </div>
  </div>

  <div class="section fade">
    <div class="block">
      <p>Мы нашли друг друга — и теперь хотим разделить этот день с вами.</p>
    </div>
  </div>

  <div class="section fade">
    <div class="block">
      <p>Когда солнце скроется за горизонтом, начнётся наша новая история.</p>
    </div>
  </div>

  <!-- RSVP -->
  <div class="section fade">
    <div class="block rsvp">
      <p>Будете с нами в этот день?</p>
      <input id="name" placeholder="Ваше имя">
      <br>
      <button onclick="send()">Я приду</button>
    </div>
  </div>

</div>

<script>
window.onload = function() {

  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');

  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  resize();
  window.addEventListener('resize', resize);

  // ⭐ звезды
  let stars = [];

  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * w,
      y: Math.random() * h,
      size: Math.random() * 1.5,
      speed: Math.random() * 0.2
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);

    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.fill();

      s.y += s.speed;

      if (s.y > h) {
        s.y = 0;
        s.x = Math.random() * w;
      }
    });

    requestAnimationFrame(draw);
  }

  draw();

  // ✨ появление блоков
  const fades = document.querySelectorAll('.fade');

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting) {
        e.target.classList.add('visible');
      }
    });
  });

  fades.forEach(el => obs.observe(el));

  // ⏳ таймер
  const countdown = document.getElementById('countdown');
  const weddingDate = new Date('2027-07-17T16:00:00');

  function updateCountdown() {
    const now = new Date();
    const diff = weddingDate - now;

    if (diff <= 0) {
      countdown.innerHTML = "Этот день настал 💜";
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
    const minutes = Math.floor(diff / (1000 * 60)) % 60;

    countdown.innerHTML =
      days + " дней " +
      hours + " часов " +
      minutes + " минут";
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
};

// 💌 RSVP
function send() {
  const name = document.getElementById('name').value;

  if(!name) {
    alert("Введите имя 😊");
    return;
  }

  alert("Спасибо, " + name + " 💜");
}
</script>

</body>
</html>
