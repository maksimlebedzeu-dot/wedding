<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #05050a;
  color: white;
}

/* 🌌 canvas как фон */
#stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* контент */
.container {
  position: relative;
  z-index: 1;
  text-align: center;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 4em;
}

.section {
  padding: 100px 20px;
}

.block {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<div class="hero">
  <h1>Марта & Максим</h1>
  <p>17 июля 2027</p>
</div>

<div class="section">
  <div class="block">
    <p>Мы будем рады видеть вас на нашей свадьбе</p>
  </div>
</div>

</div>

<script>
window.onload = function() {

  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');

  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  resize();
  window.addEventListener('resize', resize);

  let mouseX = w / 2;
  let mouseY = h / 2;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  let stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random() * w,
      y: Math.random() * h,
      size: Math.random() * 2,
      depth: Math.random()
    });
  }

  let meteors = [];

  function createMeteor() {
    meteors.push({
      x: Math.random() * w,
      y: 0,
      length: Math.random() * 100,
      speed: Math.random() * 5 + 3
    });
  }

  setInterval(createMeteor, 2500);

  function draw() {
    ctx.clearRect(0, 0, w, h);

    // звезды
    stars.forEach(s => {
      const dx = (mouseX - w/2) * 0.05 * s.depth;
      const dy = (mouseY - h/2) * 0.05 * s.depth;

      ctx.beginPath();
      ctx.arc(s.x + dx, s.y + dy, s.size, 0, Math.PI * 2);
      ctx.fillStyle = "white";
      ctx.fill();
    });

    // падающие звезды
    meteors.forEach((m, i) => {
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(m.x - m.length, m.y + m.length);
      ctx.strokeStyle = "white";
      ctx.stroke();

      m.x += m.speed;
      m.y += m.speed;

      if (m.y > h) meteors.splice(i, 1);
    });

    requestAnimationFrame(draw);
  }

  draw();
};
</script>

</body>
</html>
