<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #05050a;
  color: white;
}

/* canvas */
#canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 5;
}

/* секции */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 1;
  position: relative;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 4em;
}

.block {
  background: rgba(255,255,255,0.06);
  padding: 50px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
}

/* 💥 FLASH */
.flash {
  position: fixed;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: radial-gradient(circle, white, transparent);
  pointer-events: none;
  z-index: 9;
  animation: flashAnim 0.6s ease-out forwards;
}

@keyframes flashAnim {
  0% {
    transform: scale(1);
    opacity: 1;
  }
  100% {
    transform: scale(15);
    opacity: 0;
  }
}

/* ✉️ OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(12px);
  display: none;
  justify-content: center;
  align-items: center;
  perspective: 1000px;
  z-index: 10;
}

.overlay.active {
  display: flex;
}

/* письмо */
.letter {
  width: 320px;
  height: 420px;
  position: relative;
  transform-style: preserve-3d;
  animation: openLetter 1s ease forwards;
}

/* “обложка” */
.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 20px;
  backface-visibility: hidden;
}

/* передняя сторона */
.front {
  background: #e8e2d8;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Playfair Display', serif;
  font-size: 24px;
}

/* внутренняя */
.back {
  background: #f5f2ec;
  color: #222;
  transform: rotateY(180deg);
  padding: 30px;
  box-sizing: border-box;
  text-align: center;
}

/* анимация раскрытия */
@keyframes openLetter {
  from {
    transform: rotateY(0deg);
  }
  to {
    transform: rotateY(180deg);
  }
}

.close {
  position: absolute;
  top: 30px;
  left: 30px;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="section hero">
  <div>
    <h1>Марта & Максим</h1>
    <p>17 июля 2027</p>
  </div>
</div>

<div class="section">
  <div class="block">Всё началось с одного взгляда</div>
</div>

<div class="section">
  <div class="block">Мы нашли друг друга</div>
</div>

<div class="section">
  <div class="block">И хотим разделить этот день с вами</div>
</div>

<!-- ✉️ OVERLAY -->
<div class="overlay" id="overlay">
  <div class="close" onclick="closeOverlay()">←</div>

  <div class="letter">
    <div class="front">
      Приглашение
    </div>

    <div class="back">
      <h2>Wedding Day</h2>
      <p>17 / 07 / 2027</p>
      <p>Моринское агроусадьба</p>
      <p>15:30 — сбор гостей</p>
      <p>16:00 — церемония</p>
      <p>18:30 — банкет</p>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ⭐ звезды */
let stars = [];
for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * w,
    y: Math.random() * h,
    size: Math.random() * 1.5
  });
}

/* ☄️ кометы */
let comets = [];

function createComet() {
  comets.push({
    x: Math.random() * w * 0.7,
    y: -50,
    vx: 1.2,
    vy: 1.2,
    length: 120
  });
}

/* 💥 вспышка */
function createFlash(x, y) {
  const flash = document.createElement('div');
  flash.className = 'flash';
  flash.style.left = x + 'px';
  flash.style.top = y + 'px';

  document.body.appendChild(flash);

  setTimeout(() => flash.remove(), 600);
}

/* 🎯 клик */
canvas.addEventListener('click', (e) => {

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  comets.forEach(c => {
    const dx = mx - c.x;
    const dy = my - c.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 50) {
      createFlash(mx, my);
      setTimeout(() => openOverlay(), 300);
    }
  });
});

/* 🎬 отрисовка */
function draw() {
  ctx.clearRect(0, 0, w, h);

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
  });

  comets.forEach((c, i) => {

    const gradient = ctx.createLinearGradient(
      c.x, c.y,
      c.x - c.length, c.y - c.length
    );

    gradient.addColorStop(0, "white");
    gradient.addColorStop(1, "transparent");

    ctx.strokeStyle = gradient;
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(c.x, c.y);
    ctx.lineTo(c.x - c.length, c.y - c.length);
    ctx.stroke();

    c.x += c.vx;
    c.y += c.vy;

    if (c.y > h + 100) {
      comets.splice(i, 1);
    }
  });

  requestAnimationFrame(draw);
}
draw();

/* запуск комет */
setInterval(() => {
  if (Math.random() > 0.4) {
    createComet();
  }
}, 3000);

/* overlay */
function openOverlay() {
  document.getElementById('overlay').classList.add('active');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}
</script>

</body>
</html>
