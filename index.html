<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #05050a;
  color: white;
  overflow-x: hidden;
}

/* 🌌 фон */
#stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
}

/* секции */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 4em;
}

.countdown {
  margin-top: 15px;
  font-size: 1.3em;
}

/* блок */
.block {
  background: rgba(255,255,255,0.06);
  padding: 50px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
}

/* анимация */
.fade {
  opacity: 0;
  transform: translateY(60px);
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
  transition: 1s ease;
}

/* ☄️ КОМЕТА */
.comet {
  position: fixed;
  width: 2px;
  height: 120px;
  background: linear-gradient(to top, white, transparent);
  transform: rotate(45deg); /* ✅ теперь совпадает с движением */
  pointer-events: auto;
  cursor: pointer;
  z-index: 100;
  opacity: 0.9;
}

/* overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 200;
}

.overlay.active {
  display: flex;
}

.invite {
  background: #f5f2ec;
  color: #222;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  max-width: 400px;
}

.close {
  position: absolute;
  top: 30px;
  left: 30px;
  font-size: 24px;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="section hero fade">
  <div>
    <h1>Марта & Максим</h1>
    <p>17 июля 2027</p>
    <div class="countdown" id="countdown"></div>
  </div>
</div>

<div class="section fade">
  <div class="block">Всё началось с одного взгляда</div>
</div>

<div class="section fade">
  <div class="block">Мы нашли друг друга</div>
</div>

<div class="section fade">
  <div class="block">И хотим разделить этот день с вами</div>
</div>

<!-- 💌 overlay -->
<div class="overlay" id="overlay">
  <div class="close" onclick="closeOverlay()">←</div>
  <div class="invite">
    <h2>Wedding Day</h2>
    <p>17 / 07 / 2027</p>
    <p>Моринское агроусадьба</p>
  </div>
</div>

<script>
/* ⭐ фон */
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');

let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let stars = [];

for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * w,
    y: Math.random() * h,
    size: Math.random() * 1.5,
    speed: Math.random() * 0.2
  });
}

function draw() {
  ctx.clearRect(0, 0, w, h);

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();

    s.y += s.speed;
    if (s.y > h) {
      s.y = 0;
      s.x = Math.random() * w;
    }
  });

  requestAnimationFrame(draw);
}
draw();

/* ⏳ таймер */
const countdown = document.getElementById('countdown');
const weddingDate = new Date('2027-07-17T16:00:00');

function updateCountdown() {
  const diff = weddingDate - new Date();
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor(diff / (1000*60*60)) % 24;

  countdown.innerHTML = days + " дней " + hours + " часов";
}
setInterval(updateCountdown, 1000);
updateCountdown();

/* ✨ появление */
const fades = document.querySelectorAll('.fade');
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting) e.target.classList.add('visible');
  });
});
fades.forEach(el => obs.observe(el));

/* ☄️ КОМЕТА — ИСПРАВЛЕННАЯ */
function createComet() {

  const comet = document.createElement('div');
  comet.className = 'comet';

  let x = Math.random() * window.innerWidth * 0.8;
  let y = -100;

  comet.style.left = x + 'px';
  comet.style.top = y + 'px';

  document.body.appendChild(comet);

  const speed = 1.5 + Math.random(); // медленно

  function animate() {
    x += speed;
    y += speed;

    comet.style.left = x + 'px';
    comet.style.top = y + 'px';

    if (y < window.innerHeight + 100) {
      requestAnimationFrame(animate);
    } else {
      comet.remove();
    }
  }

  animate();

  // ✅ КЛИК РАБОТАЕТ
  comet.addEventListener('click', (e) => {
    e.stopPropagation();
    openOverlay();
    comet.remove();
  });
}

/* ✅ ЧАЩЕ */
setInterval(() => {
  createComet();
}, 4000); // каждые 4 секунды

/* overlay */
function openOverlay() {
  document.getElementById('overlay').classList.add('active');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}
</script>

</body>
</html>
