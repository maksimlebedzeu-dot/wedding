<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #05050a;
  color: white;
  overflow-x: hidden;
}

/* 🌌 фон */
#stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* контент */
.container {
  position: relative;
  z-index: 1;
  text-align: center;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 4em;
  margin: 0;
}

.hero p {
  opacity: 0.7;
}

/* секции */
.section {
  padding: 100px 20px;
}

.block {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

  <div class="hero">
    <h1>Марта & Максим</h1>
    <p>17 июля 2027</p>
  </div>

  <div class="section">
    <div class="block">
      <p>Мы будем рады видеть вас на нашей свадьбе</p>
    </div>
  </div>

</div>

<script>
window.onload = function() {

  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');

  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  resize();
  window.addEventListener('resize', resize);

  // 🖱 мышь
  let mouseX = w / 2;
  let mouseY = h / 2;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  // ⭐ звезды
  let stars = [];
  for (let i = 0; i < 160; i++) {
    stars.push({
      x: Math.random() * w,
      y: Math.random() * h,
      size: Math.random() * 1.5,
      depth: Math.random()
    });
  }

  // 🌠 метеоры
  let meteors = [];

  function createMeteor() {
    meteors.push({
      x: Math.random() * w,
      y: -50,
      length: Math.random() * 120 + 80,
      speed: Math.random() * 6 + 4,
      life: 1
    });
  }

  setInterval(createMeteor, 3000);

  function draw() {
    ctx.clearRect(0, 0, w, h);

    // ⭐ звезды (параллакс)
    stars.forEach(s => {
      const dx = (mouseX - w/2) * 0.05 * s.depth;
      const dy = (mouseY - h/2) * 0.05 * s.depth;

      ctx.beginPath();
      ctx.arc(s.x + dx, s.y + dy, s.size, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.fill();
    });

    // 🌠 метеоры (красивые)
    meteors.forEach((m, i) => {

      const gradient = ctx.createLinearGradient(
        m.x, m.y,
        m.x - m.length, m.y + m.length
      );

      gradient.addColorStop(0, "rgba(255,255,255,1)");
      gradient.addColorStop(1, "rgba(255,255,255,0)");

      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(m.x - m.length, m.y + m.length);
      ctx.strokeStyle = gradient;
      ctx.lineWidth = 2;
      ctx.stroke();

      m.x += m.speed;
      m.y += m.speed;
      m.life -= 0.02;

      if (m.life <= 0 || m.y > h) {
        meteors.splice(i, 1);
      }
    });

    requestAnimationFrame(draw);
  }

  draw();
};
</script>

</body>
</html>
