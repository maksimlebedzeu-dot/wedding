<script>
/* ☄️ кометы */
let comets = [];

function createComet(){
  const angle = Math.PI / 4; // 45 градусов
  const speed = 0.6 + Math.random() * 0.4;

  comets.push({
    x: Math.random() * window.innerWidth * 0.7,
    y: -50,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    size: 2 + Math.random() * 2,
    tail: 120 + Math.random() * 80
  });
}

/* 🎨 отрисовка */
function draw(){
  ctx.clearRect(0,0,w,h);

  // ⭐ звезды
  stars.forEach(s=>{
    ctx.fillStyle = "white";
    ctx.fillRect(s.x, s.y, 1, 1);
  });

  // ☄️ кометы
  comets.forEach((c, i)=>{

    // ✨ glow
    ctx.shadowBlur = 20;
    ctx.shadowColor = "white";

    // ядро
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();

    ctx.shadowBlur = 0;

    // хвост (градиент)
    const grad = ctx.createLinearGradient(
      c.x, c.y,
      c.x - c.vx * c.tail,
      c.y - c.vy * c.tail
    );

    grad.addColorStop(0, "rgba(255,255,255,0.9)");
    grad.addColorStop(0.3, "rgba(255,255,255,0.4)");
    grad.addColorStop(1, "rgba(255,255,255,0)");

    ctx.strokeStyle = grad;
    ctx.lineWidth = c.size * 1.5;

    ctx.beginPath();
    ctx.moveTo(c.x, c.y);
    ctx.lineTo(
      c.x - c.vx * c.tail,
      c.y - c.vy * c.tail
    );
    ctx.stroke();

    // движение
    c.x += c.vx;
    c.y += c.vy;

    // удаление
    if(c.y > h + 100){
      comets.splice(i,1);
    }
  });

  requestAnimationFrame(draw);
}
</script>
