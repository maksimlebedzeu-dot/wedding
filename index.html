<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #07070d;
  color: white;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.hero::before {
  content: "";
  position: absolute;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(120,100,255,0.25), transparent 70%);
  filter: blur(120px);
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 5em;
  letter-spacing: 3px;
  margin: 0;
}

.hero p {
  margin-top: 20px;
  opacity: 0.7;
  font-size: 1.2em;
}

/* SECTION */
.section {
  padding: 120px 20px;
  max-width: 900px;
  margin: auto;
}

.fade {
  opacity: 0;
  transform: translateY(60px);
  transition: 1.2s ease;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
}

/* BLOCK */
.block {
  margin-top: 40px;
  padding: 40px;
  border-radius: 25px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
}

/* COUNTDOWN */
.countdown {
  font-size: 2em;
  margin-top: 20px;
  letter-spacing: 2px;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 14px 28px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #7b6cff, #9d8cff);
  color: white;
  cursor: pointer;
  font-size: 1em;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(140,120,255,0.5);
}

/* INPUT */
input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  width: 250px;
  background: rgba(255,255,255,0.08);
  color: white;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <h1>Марта & Максим</h1>
    <p>17 июля 2027</p>
    <div class="countdown" id="countdown"></div>
  </div>
</div>

<div class="section fade">
  <h2>Это началось в один обычный день…</h2>
  <div class="block">
    <p>И стало историей, которую мы хотим разделить с вами.</p>
  </div>
</div>

<div class="section fade">
  <h2>Детали вечера</h2>
  <div class="block">
    <p>Моринское агроусадьба</p>
    <p>Начало в 16:00</p>
  </div>
</div>

<div class="section fade">
  <h2>Будете с нами?</h2>
  <div class="block">
    <input id="name" placeholder="Ваше имя">
    <br>
    <button onclick="send()">Я приду</button>
  </div>
</div>

<script>
/* появление блоков */
const fades = document.querySelectorAll('.fade');
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting) e.target.classList.add('visible');
  });
});
fades.forEach(el => obs.observe(el));

/* таймер */
const countdown = document.getElementById('countdown');
const weddingDate = new Date('2027-07-17');

setInterval(() => {
  const now = new Date();
  const diff = weddingDate - now;

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor(diff / (1000*60*60)) % 24;

  countdown.innerHTML = days + " дней " + hours + " часов";
}, 1000);

/* кнопка */
function send() {
  const name = document.getElementById('name').value;
  alert("Спасибо, " + name + " 💜");
}
</script>

</body>
</html>
