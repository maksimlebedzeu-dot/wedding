<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #05050a;
  color: white;
  overflow-x: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* секции */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 1;
  position: relative;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 4em;
}

.countdown {
  margin-top: 15px;
  font-size: 1.3em;
}

.block {
  background: rgba(255,255,255,0.06);
  padding: 50px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
}

/* overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.overlay.active {
  display: flex;
}

.invite {
  background: #f5f2ec;
  color: #222;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

.close {
  position: absolute;
  top: 30px;
  left: 30px;
  font-size: 24px;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="section hero">
  <div>
    <h1>Марта & Максим</h1>
    <p>17 июля 2027</p>
    <div id="countdown"></div>
  </div>
</div>

<div class="section">
  <div class="block">Всё началось с одного взгляда</div>
</div>

<div class="section">
  <div class="block">Мы нашли друг друга</div>
</div>

<div class="section">
  <div class="block">И хотим разделить этот день с вами</div>
</div>

<div class="overlay" id="overlay">
  <div class="close" onclick="closeOverlay()">←</div>
  <div class="invite">
    <h2>Wedding Day</h2>
    <p>17 / 07 / 2027</p>
    <p>Моринское агроусадьба</p>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ⭐ звезды */
let stars = [];
for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * w,
    y: Math.random() * h,
    size: Math.random() * 1.5
  });
}

/* ☄️ кометы */
let comets = [];

function createComet() {
  comets.push({
    x: Math.random() * w * 0.7,
    y: -50,
    vx: 1.2,   // скорость по X
    vy: 1.2,   // скорость по Y (угол 45°)
    length: 120
  });
}

/* 🎯 клик */
canvas.addEventListener('click', (e) => {
  const mx = e.clientX;
  const my = e.clientY;

  comets.forEach(c => {
    const dx = mx - c.x;
    const dy = my - c.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 40) { // зона клика увеличена
      openOverlay();
    }
  });
});

/* 🎬 отрисовка */
function draw() {
  ctx.clearRect(0, 0, w, h);

  // звезды
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
  });

  // кометы
  comets.forEach((c, i) => {

    // хвост
    const gradient = ctx.createLinearGradient(
      c.x, c.y,
      c.x - c.length, c.y - c.length
    );

    gradient.addColorStop(0, "white");
    gradient.addColorStop(1, "transparent");

    ctx.strokeStyle = gradient;
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(c.x, c.y);
    ctx.lineTo(c.x - c.length, c.y - c.length);
    ctx.stroke();

    // движение (медленное!)
    c.x += c.vx;
    c.y += c.vy;

    // удаление
    if (c.y > h + 100) {
      comets.splice(i, 1);
    }
  });

  requestAnimationFrame(draw);
}
draw();

/* ⏳ таймер */
const countdown = document.getElementById('countdown');
const weddingDate = new Date('2027-07-17T16:00:00');

function updateCountdown() {
  const diff = weddingDate - new Date();
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor(diff / (1000*60*60)) % 24;

  countdown.innerHTML = days + " дней " + hours + " часов";
}
setInterval(updateCountdown, 1000);
updateCountdown();

/* ☄️ чаще, но красиво */
setInterval(() => {
  if (Math.random() > 0.4) {
    createComet();
  }
}, 3000);

/* overlay */
function openOverlay() {
  document.getElementById('overlay').classList.add('active');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}
</script>

</body>
</html>
