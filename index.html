<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>test</title>
<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
}
#stars {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>Работает?</h1>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

ctx.fillStyle = "white";
ctx.fillRect(100,100,5,5);
</script>

</body>
</html>
