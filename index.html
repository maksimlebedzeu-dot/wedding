<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #05050a;
  color: white;
  overflow-x: hidden;
}

/* 🌌 фон */
#stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
}

/* контейнер */
.container {
  position: relative;
  z-index: 1;
}

/* HERO и секции — 100vh */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 4em;
  margin: 0;
}

.countdown {
  margin-top: 15px;
  font-size: 1.3em;
  opacity: 0.8;
}

/* карточка */
.block {
  background: rgba(255,255,255,0.06);
  padding: 50px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
  max-width: 600px;
}

/* ✨ анимация */
.fade {
  opacity: 0;
  transform: translateY(60px);
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
  transition: 1s ease;
}

/* ☄️ комета */
.comet {
  position: fixed;
  width: 3px;
  height: 80px;
  background: linear-gradient(white, transparent);
  opacity: 0.8;
  pointer-events: auto;
  cursor: pointer;
  transform: rotate(45deg);
  z-index: 2;
}

/* 💌 оверлей */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.overlay.active {
  display: flex;
}

/* карточка приглашения */
.invite {
  background: #f5f2ec;
  color: #222;
  width: 90%;
  max-width: 400px;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  animation: scaleIn 0.5s ease;
}

@keyframes scaleIn {
  from { transform: scale(0.9); opacity: 0 }
  to { transform: scale(1); opacity: 1 }
}

.invite h2 {
  font-family: 'Playfair Display', serif;
  margin-top: 0;
}

.close {
  position: absolute;
  top: 30px;
  left: 30px;
  font-size: 24px;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

  <!-- HERO -->
  <div class="section hero fade">
    <div>
      <h1>Марта & Максим</h1>
      <p>17 июля 2027</p>
      <div class="countdown" id="countdown"></div>
    </div>
  </div>

  <!-- БЛОКИ -->
  <div class="section fade">
    <div class="block">
      Всё началось с одного взгляда
    </div>
  </div>

  <div class="section fade">
    <div class="block">
      Мы нашли друг друга
    </div>
  </div>

  <div class="section fade">
    <div class="block">
      И хотим разделить этот день с вами
    </div>
  </div>

</div>

<!-- 💌 ОВЕРЛЕЙ -->
<div class="overlay" id="overlay">
  <div class="close" onclick="closeOverlay()">←</div>
  <div class="invite">
    <h2>Wedding Day</h2>
    <p>17 / 07 / 2027</p>
    <p>Моринское агроусадьба</p>
    <p>15:30 — сбор гостей</p>
    <p>16:00 — церемония</p>
    <p>18:30 — банкет</p>
  </div>
</div>

<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');

let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ⭐ звезды */
let stars = [];
for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * w,
    y: Math.random() * h,
    size: Math.random() * 1.5,
    speed: Math.random() * 0.2
  });
}

function draw() {
  ctx.clearRect(0, 0, w, h);

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();

    s.y += s.speed;
    if (s.y > h) {
      s.y = 0;
      s.x = Math.random() * w;
    }
  });

  requestAnimationFrame(draw);
}
draw();

/* ⏳ таймер */
const countdown = document.getElementById('countdown');
const weddingDate = new Date('2027-07-17T16:00:00');

function updateCountdown() {
  const now = new Date();
  const diff = weddingDate - now;

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor(diff / (1000*60*60)) % 24;

  countdown.innerHTML = days + " дней " + hours + " часов";
}
setInterval(updateCountdown, 1000);
updateCountdown();

/* ✨ появление */
const fades = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
});

fades.forEach(el => observer.observe(el));

/* ☄️ КОМЕТЫ */
function createComet() {
  const comet = document.createElement('div');
  comet.className = 'comet';

  comet.style.top = Math.random()*window.innerHeight + 'px';
  comet.style.left = Math.random()*window.innerWidth + 'px';

  document.body.appendChild(comet);

  let pos = 0;

  const interval = setInterval(() => {
    pos += 10;
    comet.style.transform = `translate(${pos}px, ${pos}px) rotate(45deg)`;

    if (pos > 600) {
      clearInterval(interval);
      comet.remove();
    }
  }, 16);

  comet.onclick = () => openOverlay();
}

/* случайный запуск */
setInterval(() => {
  if (Math.random() > 0.5) {
    createComet();
  }
}, 5000);

/* 💌 overlay */
function openOverlay() {
  document.getElementById('overlay').classList.add('active');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}
</script>

</body>
</html>
